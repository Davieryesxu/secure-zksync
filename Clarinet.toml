[project]
name = "secure-zksync"
authors = ["ZKSync Team"]
description = "Secure subscription management and payment processing on ZKSync"
telemetry = false
requirements = []
[contracts.zk-payment-gateway]
path = "contracts/zk-payment-gateway.clar"
depends_on = []

[contracts.zk-subscription-tracker]
path = "contracts/zk-subscription-tracker.clar"
depends_on = []

[contracts.zk-subscription-controller]
path = "contracts/zk-subscription-controller.clar"
depends_on = []

[repl]
costs_version = 2
parser_version = 2

[repl.analysis]
passes = ["check_checker"]

[repl.analysis.check_checker]
strict = false
trusted_sender = false
trusted_caller = false
callee_filter = false
